<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVF Login</title>
    <link rel="stylesheet" href="/hvf-app/css/style.css">
</head>

<body>

<!-- MAIN CONTENT -->
<div class="main-content">

    <div class="card">
        <h2>Login</h2>

        <form id="loginForm" action="login.php" method="post">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
            <button type="button" id="registerBtn">Register</button>
        </form>
    </div>

</div>

<!-- REGISTER POPUP -->
<div id="registerPopup" class="popup" style="display:none;">
    <div class="popup-content">

        <span class="close" style="cursor:pointer;">&times;</span>

        <form action="register.php" method="post">
            <h2>Register</h2>

            <label>Username</label>
            <input type="text" name="newUser" required>

            <label>Password</label>
            <input type="password" name="newPass" required>

            <button type="submit">Create Account</button>
        </form>

    </div>
</div>

<!-- JAVASCRIPT (ONLY ONE SCRIPT BLOCK) -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const popup = document.getElementById("registerPopup");
    const btn = document.getElementById("registerBtn");
    const closeBtn = document.querySelector(".close");

    // Safety check
    if (!popup || !btn) {
        console.error("Missing register elements");
        return;
    }

    // Open popup
    btn.addEventListener("click", function () {
        popup.style.display = "block";
    });

    // Close popup
    if (closeBtn) {
        closeBtn.addEventListener("click", function () {
            popup.style.display = "none";
        });
    }

    // Close when clicking outside box
    window.addEventListener("click", function (e) {
        if (e.target === popup) {
            popup.style.display = "none";
        }
    });

});
</script>

</body>
</html>
